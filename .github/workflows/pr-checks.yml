name: PR Checks

# Runs on every pull request targeting the main branch
on:
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Backend unit tests (Jest)
  # ─────────────────────────────────────────
  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run unit tests
        run: npm test
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret

  # ─────────────────────────────────────────
  # JOB 2: Backend API tests (Playwright)
  # ─────────────────────────────────────────
  backend-api:
    name: Backend API Tests
    runs-on: ubuntu-latest
    needs: backend-unit  # only runs if unit tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: backend

      - name: Run API tests
        run: npm run test:api
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-api-report
          path: backend/playwright-report/

  # ─────────────────────────────────────────
  # JOB 3: Frontend unit tests (Vitest)
  # ─────────────────────────────────────────
  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run unit tests
        run: npm test
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:3000

  # ─────────────────────────────────────────
  # JOB 4: Frontend E2E tests (Playwright)
  # Needs both backend and frontend servers running
  # ─────────────────────────────────────────
  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-unit, frontend-unit]  # only runs if both unit test jobs pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: frontend
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret
          VITE_API_URL: http://localhost:3000
          BASE_URL: http://localhost:5173

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-report
          path: frontend/playwright-report/
